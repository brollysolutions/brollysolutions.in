server {
    listen 3002;
    server_name localhost;

    # This server sits behind a TLS-terminating proxy on the public domain.
    # Absolute redirects would rebuild Location from the Host header plus the
    # port below, bouncing visitors off HTTPS onto brollysolutions.in:3002.
    absolute_redirect off;

    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
